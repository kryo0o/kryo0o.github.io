---
layout: default
title: 404 - 页面未找到
---

<div class="error-page">
  <div class="error-404">404</div>

  <h2 class="error-title">页面好像迷路了</h2>
  <p class="error-desc">
    你访问的页面可能已被删除、移动或从未存在过<br>
    可以尝试搜索内容或返回首页继续浏览
  </p>

  <div class="error-actions">
    <a href="{{ site.baseurl }}/" class="btn btn-primary">
      <i class="fa-solid fa-home"></i> 回到首页
    </a>
    <a href="javascript:void(0)" class="btn btn-secondary" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i> 返回上页
    </a>
  </div>

  <div class="error-extra">
    <p>如果认为这是一个错误，可以 <a href="mailto:{{ site.email | default: 'contact@example.com' }}">联系我们</a></p>
  </div>
</div>
