---
layout: default
---

<article class="article-card">
  <h1 class="article-title">{{ page.title }}</h1>

  <div class="article-meta">
    <span><i class="fa-regular fa-calendar"></i> {{ page.date | date: "%Y-%m-%d" }}</span>
    {% assign words = content | number_of_words %}
    <span><i class="fa-regular fa-clock"></i> {{ words | divided_by: 200 | plus: 1 }} 分钟阅读</span>
  </div>

  <div class="article-content">
    {{ content }}
  </div>
</article>

<div class="back-link">
  <a href="{{ '/' | relative_url }}">
    <i class="fa-solid fa-arrow-left"></i> 返回首页
  </a>
</div>
